services:
  - type: web
    name: expense-tracker-backend
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: "REPLACE_WITH_VERCEL_URL"
      - key: SUPABASE_URL
        value: "REPLACE_WITH_SUPABASE_URL"
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: "REPLACE_WITH_SERVICE_ROLE_KEY"
