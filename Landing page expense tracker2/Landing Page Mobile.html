<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Landing Mobile — Expense Tracker</title>
  <link rel="icon" type="image/png" href="public/logo-expense-tracker.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: 'Geist', system-ui, sans-serif; background:
      radial-gradient(1200px 800px at 20% 10%, rgba(99,102,241,0.06), transparent 60%),
      radial-gradient(1000px 700px at 80% 90%, rgba(34,211,238,0.05), transparent 60%),
      #f5f5f8;
      min-height: 100vh;
    }
    body::before {
      content:''; position: fixed; inset: 0; pointer-events: none; opacity: 0.35;
      background-image: linear-gradient(to right, rgba(12,12,29,0.05) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(12,12,29,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, #000 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, #000 30%, transparent 80%);
      z-index: 0;
    }
    #root { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="landing-mobile.jsx"></script>
</body>
</html>
